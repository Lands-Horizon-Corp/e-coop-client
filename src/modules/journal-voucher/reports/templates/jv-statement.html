<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title></title>
   <style>
      @page {
         size: A5 landscape;
         margin: 0;
      }

      * {
         margin: 0;
         padding: 0;
         box-sizing: border-box;
      }

      body,
      html {
         margin: 0;
         padding: 0;
         min-height: 100%;
         background-color: #f9fafb;
      }

      body {
         display: flex;
         flex-direction: column;
      }

      .jvv-container {
         --fs-xs: 7px;
         --fs-sm: 8px;
         --fs-base: 9px;
         --fs-lg: 10px;
         --fs-xl: 12px;
         --fs-2xl: 14px;
         padding: 0.3in;
         background: white;
         font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
         color: #1f2937;
         font-size: var(--fs-base);
         line-height: 1.3;
         flex-grow: 1;
         display: flex;
         flex-direction: column;
         width: 100%;
      }

      .jvv-header {
         text-align: center;
         margin-bottom: 0.3rem;
         padding-bottom: 0.15rem;
         border-bottom: 1px solid #e5e7eb;
      }

      .jvv-header h1 {
         font-size: var(--fs-xl);
         font-weight: 800;
         color: #111827;
         margin-bottom: 0.1rem;
      }

      .jvv-report-title {
         font-size: var(--fs-2xl);
         font-weight: 800;
         color: #111827;
         margin-top: 0.25rem;
         text-transform: uppercase;
      }

      .jvv-info-grid {
         display: grid;
         grid-template-columns: repeat(2, 1fr);
         gap: 0.15rem;
         margin-bottom: 0.4rem;
      }

      .jvv-info-label {
         font-size: var(--fs-sm);
         font-weight: 600;
         color: #575656;
         min-width: 65px;
         display: inline-block;
      }

      .jvv-info-value {
         font-weight: 600;
         color: #1f2937;
         padding-left: 0.25rem;
      }

      .jvv-table-wrapper {
         width: 100%;
         margin-bottom: 0.3rem;
      }

      .jvv-table-wrapper table {
         width: 100%;
         border-collapse: collapse;
         font-size: var(--fs-base);
      }

      .jvv-table-wrapper th {
         text-transform: uppercase;
         font-size: var(--fs-sm);
         font-weight: 700;
         color: #374151;
         padding: 0.3rem;
         text-align: left;
         border-bottom: 2px solid #e5e7eb;
      }

      .jvv-table-wrapper td {
         padding: 0.25rem 0.3rem;
         border-bottom: 1px solid #f3f4f6;
      }

      .text-right {
         text-align: right;
         font-family: 'SF Mono', 'Monaco', monospace;
         font-variant-numeric: tabular-nums;
      }

      .totals {
         background: #f3f4f6;
         font-weight: 700;
         border-top: 1px solid #9ca3af;
      }

      .jvv-status-bar {
         margin: 0.3rem 0;
         padding: 0.3rem 0.15rem;
         background: #fef3c7;
         border: 1px solid #fbbf24;
         border-radius: 0.15rem;
         color: #78350f;
         font-weight: 700;
         text-align: center;
      }

      .jvv-signature-section {
         margin-top: 1.2rem;
         padding-top: 0.5rem;
      }

      .jvv-sig-row {
         display: grid;
         grid-template-columns: repeat(2, 1fr);
         gap: 2.5rem;
         padding: 0 5%;
      }

      .jvv-signature-item {
         text-align: center;
      }

      .jvv-signature-label {
         font-size: var(--fs-sm);
         font-weight: 700;
         color: #6b7280;
         text-transform: uppercase;
         margin-bottom: 0.15rem;
      }

      .jvv-signature-line {
         border-bottom: 1px solid #9ca3af;
         padding: 0.15rem 0;
         min-height: 1.2rem;
         font-weight: 600;
         color: #1f2937;
      }

      .jvv-footer {
         margin-top: auto;
         display: grid;
         grid-template-columns: repeat(3, 1fr);
         font-size: var(--fs-xs);
         color: #9ca3af;
         border-top: 1px dotted #e5e7eb;
         padding-top: 5px;
      }

      .highlight {
         background: #dbeafe !important;
         font-weight: 700;
         color: #1e40af;
      }

      @media print {
         body {
            background: white;
         }

         * {
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
         }
      }
   </style>
</head>

<body>
   <div class="jvv-container">
      <header class="jvv-header">
         <h1></h1>
         <p style="color: #6b7280; font-size: var(--fs-base);"></p>
         <p style="font-size: var(--fs-sm); color: #575656;">TIN: </p>
         <h1 class="jvv-report-title"></h1>
      </header>

      <div class="jvv-info-grid">
         <div class="jvv-info-item">
            <p>
               <span class="jvv-info-label">Name:</span><span class="jvv-info-value"></span>
            </p>
            <p>
               <span class="jvv-info-label" style="font-size: var(--fs-xs);">Particulars:</span><span
                  class="jvv-info-value" style="font-weight: 400;"></span>
            </p>
         </div>
         <div class="jvv-info-item" style="text-align: right;">
            <p>
               <span class="jvv-info-label">Voucher No:</span><span class="jvv-info-value"></span>
            </p>
            <p>
               <span class="jvv-info-label">Entry Date:</span><span class="jvv-info-value"></span>
            </p>
         </div>
      </div>

      <div class="jvv-table-wrapper">
         <table>
            <thead>
               <tr>
                  <th>Account Title</th>
                  <th class="text-right">Debit (₱)</th>
                  <th class="text-right">Credit (₱)</th>
               </tr>
            </thead>
            <tbody>

               <tr class="totals">
                  <td>TOTAL</td>
                  <td class="text-right"></td>
                  <td class="text-right"></td>
               </tr>
            </tbody>
         </table>
      </div>

      <div class="jvv-status-bar">*** () ***</div>

      <div class="jvv-signature-section">
         <div class="jvv-sig-row">
            <div class="jvv-signature-item">
               <p class="jvv-signature-label">Prepared By</p>
               <div class="jvv-signature-line"></div>
            </div>
            <div class="jvv-signature-item">
               <p class="jvv-signature-label">Approved By</p>
               <div class="jvv-signature-line"></div>
            </div>
         </div>
      </div>

      <footer class="jvv-footer">
         <span>ID: </span>
         <span style="text-align: center;"></span>
         <span style="text-align: right;"></span>
      </footer>
   </div>
</body>

</html>
