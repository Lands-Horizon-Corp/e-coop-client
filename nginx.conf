server {
    listen 80;
    server_name _;
    
    root /usr/share/nginx/html;
    index index.html;

    # This is crucial for TanStack Router! 
    # It tells Nginx: "If you can't find a file, serve index.html"
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional but highly recommended: Cache static assets to make your app blazing fast
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}