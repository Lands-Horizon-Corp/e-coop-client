worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ==========================================
    # 1. Enable GZIP Compression (Massive speed boost)
    # ==========================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types 
        text/plain 
        text/css 
        text/xml 
        application/json 
        text/javascript 
        application/x-javascript 
        application/xml 
        application/javascript 
        image/svg+xml;

    server {
        # Nginx listens on 80 and proxies to Bun on 3000
        listen 80;
        server_name _;

        # Where your built static files live (from the Dockerfile)
        root /usr/share/nginx/html;
        index index.html;

        # ==========================================
        # 2. Static Asset Caching (Vite/Nitro hashed files)
        # ==========================================
        # These files never change, so we cache them for 1 year.
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
            try_files $uri @bun_server;
        }

        # ==========================================
        # 3. Security: No caching for Entry Points
        # ==========================================
        # Ensure users always get the latest version of your app.
        location ~* (index\.html|sw\.js)$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            expires 0;
            try_files $uri @bun_server;
        }

        # ==========================================
        # 4. Main Request Handler
        # ==========================================
        location / {
            # Try to serve a static file first, otherwise send to Bun
            try_files $uri $uri/ @bun_server;
        }

        # ==========================================
        # 5. The Bun Proxy (Port 3000)
        # ==========================================
        location @bun_server {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            
            # Allow WebSockets (for HMR or real-time features)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            
            # Pass correct headers to the Bun app
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_cache_bypass $http_upgrade;
        }

        # Custom Error Page (Optional)
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}