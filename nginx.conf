server {
    listen 80;
    server_name _;
    
    root /usr/share/nginx/html;
    index index.html;

    # ==========================================
    # 1. Enable GZIP Compression (Massive speed boost)
    # ==========================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json text/javascript application/x-javascript application/xml application/javascript;

    # ==========================================
    # 2. NEVER cache the Service Worker or index.html
    # ==========================================
    # We must force the browser to check the server for these files 
    # every single time, so your users always get the newest app updates.
    location ~* (index\.html|sw\.js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # ==========================================
    # 3. Handle React/TanStack Router
    # ==========================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ==========================================
    # 4. Aggressively cache Vite's hashed assets
    # ==========================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off; # Turn off logging for static assets to save CPU/Disk I/O
    }
}